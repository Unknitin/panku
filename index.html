:root {
  --gold: #f5c518;
  --orange: #ff6a00;
  --red: #c0392b;
  --dark: #0d0d0d;
  --card: #161616;
  --card2: #1a1a1a;
  --border: rgba(255,255,255,0.06);
  --text: #f0f0f0;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  background-color: #0d0d0d;
  /* Rich layered dark background — no white */
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(180, 30, 10, 0.28) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 100% 80%, rgba(120, 50, 0, 0.2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 0% 60%, rgba(80, 10, 10, 0.18) 0%, transparent 55%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    );
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

.emoji { font-family: 'Noto Color Emoji', sans-serif; }

/* ── Noise grain overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 1;
}

/* ── Card wrapper ── */
.wrapper {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 460px;
  margin: 32px 16px;
  padding: 40px 28px 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 20px;
  background: linear-gradient(160deg, #1c1c1c 0%, #141414 60%, #111111 100%);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  box-shadow:
    0 0 0 1px rgba(245,197,24,0.07),
    0 8px 40px rgba(0,0,0,0.7),
    0 2px 8px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

/* Gold top accent line */
.wrapper::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--orange), transparent);
  border-radius: 2px;
}

/* ── Avatar ── */
.avatar-ring {
  width: 114px;
  height: 114px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, var(--gold), var(--orange), var(--red));
  animation: ringPulse 2.8s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes ringPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(245,197,24,0.5), 0 0 24px rgba(255,106,0,0.2); }
  50%       { box-shadow: 0 0 0 10px rgba(245,197,24,0), 0 0 40px rgba(255,106,0,0.35); }
}
.avatar-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  background: #222;
}

/* ── Name tag ── */
.name-tag {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(245,197,24,0.08);
  border: 1px solid rgba(245,197,24,0.25);
  border-radius: 50px;
  padding: 5px 16px;
}

/* ── Headline ── */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 7.5vw, 3rem);
  line-height: 1.1;
  letter-spacing: 0.02em;
  background: linear-gradient(150deg, #ffffff 20%, #e0c060 60%, var(--orange) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.fire-icon {
  display: inline-block;
  -webkit-text-fill-color: initial;
  animation: firePulse 0.65s ease-in-out infinite alternate;
}
@keyframes firePulse {
  from { transform: scale(1) rotate(-4deg); }
  to   { transform: scale(1.18) rotate(4deg); }
}

/* ── Sub text ── */
.sub {
  font-size: 0.88rem;
  color: #999;
  font-weight: 600;
  max-width: 320px;
  line-height: 1.65;
}

/* ── Divider ── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
}

/* ── CTA ── */
.cta-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
}
.arrow-down { animation: arrowBounce 0.75s ease-in-out infinite alternate; }
.arrow-up   { animation: arrowBounce 0.75s ease-in-out infinite alternate-reverse; }
@keyframes arrowBounce {
  from { transform: translateY(0); }
  to   { transform: translateY(7px); }
}

.cta-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  max-width: 340px;
  padding: 17px 24px;
  border-radius: 13px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  text-decoration: none;
  color: #000;
  background: linear-gradient(135deg, #f7d000 0%, var(--orange) 100%);
  box-shadow:
    0 6px 28px rgba(255,106,0,0.4),
    0 1px 0 rgba(255,255,255,0.2) inset,
    0 -2px 0 rgba(0,0,0,0.2) inset;
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative;
  overflow: hidden;
}
.cta-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 55%);
  border-radius: inherit;
}
.cta-btn:hover {
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 12px 36px rgba(255,106,0,0.55);
}
.cta-btn:active { transform: scale(0.98); }

.click-hint {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.05em;
}

/* ── Timer ── */
.timer-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px;
}
.timer-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #666;
  font-weight: 700;
}
.timer-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.8rem;
  line-height: 1;
  width: 90px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #1e1e1e, #131313);
  border: 1px solid rgba(245,197,24,0.15);
  border-radius: 14px;
  color: var(--gold);
  box-shadow:
    0 4px 24px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
  transition: color 0.3s, border-color 0.3s;
}
.timer-num.flash {
  color: #ff4444;
  border-color: rgba(255,68,68,0.35);
  box-shadow: 0 4px 24px rgba(255,68,68,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
}
.timer-unit {
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #555;
  margin-top: 4px;
}

/* ── Ads footer ── */
.ads-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.ads-label {
  font-size: 0.65rem;
  color: #444;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.ads-link {
  font-size: 0.95rem;
  font-weight: 800;
  text-decoration: none;
  background: linear-gradient(90deg, #888, #555);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
  transition: opacity 0.2s;
}
.ads-link:hover { opacity: 0.6; }

.badge-link { opacity: 0.3; transition: opacity 0.2s; }
.badge-link:hover { opacity: 0.65; }
.badge-link img { height: 24px; }

/* ── Particles ── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute;
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  8%   { opacity: 0.5; }
  92%  { opacity: 0.2; }
  100% { transform: translateY(-8vh) scale(1.4); opacity: 0; }
}

/* ── Redirect overlay ── */
.redirect-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.redirect-overlay.show { display: flex; }
.redirect-spinner {
  width: 52px; height: 52px;
  border: 4px solid rgba(245,197,24,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.redirect-msg {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: var(--gold);
  letter-spacing: 0.06em;
}
.redirect-sub { font-size: 0.85rem; color: #666; }

  <script>
    const REDIRECT_URL = 'https://t.me/+jwZm-LrymzcxMGVl';
    let seconds = 5;

    function tick() {

      if (seconds <= 0) {

        return;

      seconds--;
      setTimeout(tick, 1000);

    tick();

    // Particles
    const pc = document.getElementById('particles');
    ['#f5c518','#ff6a00','#c0392b','#ffffff'].forEach(col => {
